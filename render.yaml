# render.yaml
services:
  # Frontend - Static Site
  - type: static
    name: sistema-frontend
    runtime: static
    repo: https://github.com/brunorochamczal/aroma_data
    branch: main
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://sistema-backend.onrender.com/api
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
